name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Add server to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.HOSTINGER_HOST }}
          DEPLOY_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          ssh-keyscan -H -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        env:
          DEPLOY_HOST: ${{ secrets.HOSTINGER_HOST }}
          DEPLOY_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          DEPLOY_USER: ${{ secrets.HOSTINGER_USER }}
          DEPLOY_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='data/' \
            --exclude='public_html/' \
            --exclude='scripts/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='docker/' \
            --exclude='Dockerfile' \
            --exclude='docker-compose.yml' \
            --exclude='.dockerignore' \
            --exclude='gastos.php' \
            -e "ssh -p $DEPLOY_PORT -o StrictHostKeyChecking=yes" \
            ./ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Create .env on server (first deploy only)
        env:
          DEPLOY_HOST: ${{ secrets.HOSTINGER_HOST }}
          DEPLOY_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          DEPLOY_USER: ${{ secrets.HOSTINGER_USER }}
          DEPLOY_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
          APP_PASS: ${{ secrets.APP_PASS }}
        run: |
          if ssh -p "$DEPLOY_PORT" \
                 -o StrictHostKeyChecking=yes \
                 "$DEPLOY_USER@$DEPLOY_HOST" \
                 "[ -f \"$DEPLOY_PATH/.env\" ]"; then
            echo ".env ya existe en el servidor, se mantiene sin cambios."
          else
            printf 'APP_PASS=%s\nDATA_FILE=data/gastos.json\nSESSION_TTL=3600\nMAX_ATTEMPTS=3\nLOCKOUT_SEC=60\n' \
              "$APP_PASS" > /tmp/app_env
            scp -P "$DEPLOY_PORT" \
                -o StrictHostKeyChecking=yes \
                /tmp/app_env \
                "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"
            rm -f /tmp/app_env
            echo ".env creado correctamente en el servidor."
          fi

      - name: Post-deploy setup
        env:
          DEPLOY_HOST: ${{ secrets.HOSTINGER_HOST }}
          DEPLOY_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          DEPLOY_USER: ${{ secrets.HOSTINGER_USER }}
          DEPLOY_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: |
          ssh -p "$DEPLOY_PORT" \
              -o StrictHostKeyChecking=yes \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "mkdir -p $DEPLOY_PATH/data && chmod 700 $DEPLOY_PATH/data && \
               mkdir -p $DEPLOY_PATH/public_html && \
               [ -f $DEPLOY_PATH/public_html/index.php ] || echo '<?php require __DIR__ . \"/../public/index.php\";' > $DEPLOY_PATH/public_html/index.php && \
               ln -sfn $DEPLOY_PATH/public/assets $DEPLOY_PATH/public_html/assets && \
               [ -f $DEPLOY_PATH/data/tokens.json ] || (echo '[]' > $DEPLOY_PATH/data/tokens.json && chmod 600 $DEPLOY_PATH/data/tokens.json)"
