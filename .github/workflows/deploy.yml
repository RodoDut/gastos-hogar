name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Deploy via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

          rsync -avz --delete \
            --exclude='.env' \
            --exclude='data/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='docker/' \
            --exclude='Dockerfile' \
            --exclude='docker-compose.yml' \
            --exclude='.dockerignore' \
            --exclude='gastos.php' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.HOSTINGER_SSH_PORT }}" \
            ./ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_REMOTE_PATH }}/

      - name: Post-deploy: fix permissions
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.HOSTINGER_SSH_PORT }} \
              -o StrictHostKeyChecking=no \
              ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
              "mkdir -p ${{ secrets.HOSTINGER_REMOTE_PATH }}/data && chmod 700 ${{ secrets.HOSTINGER_REMOTE_PATH }}/data"
