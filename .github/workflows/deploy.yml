name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Deploy via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.HOSTINGER_HOST }}
          DEPLOY_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          DEPLOY_USER: ${{ secrets.HOSTINGER_USER }}
          DEPLOY_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" > ~/.ssh/config

          rsync -avz --delete \
            --exclude='.env' \
            --exclude='data/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='docker/' \
            --exclude='Dockerfile' \
            --exclude='docker-compose.yml' \
            --exclude='.dockerignore' \
            --exclude='gastos.php' \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT" \
            ./ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Post-deploy setup
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.HOSTINGER_HOST }}
          DEPLOY_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          DEPLOY_USER: ${{ secrets.HOSTINGER_USER }}
          DEPLOY_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p "$DEPLOY_PORT" \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "mkdir -p $DEPLOY_PATH/data && chmod 700 $DEPLOY_PATH/data"
